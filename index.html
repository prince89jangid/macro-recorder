<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Outfit", sans-serif;
        height: 100vh;
        width: 100%;
        background: linear-gradient(180deg, #0aff35, #1c7909);
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        height: 60px;
        padding: 2px 20px;
        box-shadow: 0px 0px 15px 3px black;
        border-bottom-left-radius: 15px;
        border-bottom-right-radius: 15px;
        background-color: #00d700;
      }
      .logo {
        color: white;
      }
      .search-bar {
        display: flex;
        justify-content: space-around;
        align-items: center;
        height: 60%;
        width: 30%;
        border: 1px solid grey;
        background-color: white;
        border-radius: 5px;
        padding-right: 5px;
      }

      .search-bar input {
        height: 100%;
        width: 100%;
        border: none;
        padding: 0px 20px;
        background: none;
        outline: none;
        font-size: 18px;
      }

      .search-icon {
        cursor: pointer;
      }
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 25%;
        color: white;
      }
      main {
        display: flex;
        justify-content: start;
        align-items: center;
        width: 100%;
        flex: 1;
      }
      aside {
        width: 35%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: start;
        border-right: 2px solid black;
        padding-top: 20px;
      }
      .user-info {
        display: flex;
        background-color: #303030;
        align-items: center;
        margin-block: 5px;
        padding: 5px 10px;
        width: 85%;
        gap: 20px;
        color: white;
        font-size: 18px;
        border-radius: 20px;
        cursor: pointer;
      }
      .pic {
        background-color: red;
        height: 50px;
        width: 50px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .right {
        width: 65%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 10px 10px;
        color: white;
        padding-top: 20px;
        background-color: black;
        background-image: url("whatsappBCG.png");
      }
      .right p {
        background-color: rgb(255, 166, 0);
        padding: 5px 10px;
        border-radius: 20px;
        color: black;
      }
      .message-box {
        background-color: white;
        width: 85%;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        height: 35px;
        padding: 20px 10px 20px 20px;
        background-color: #303030;
        border-radius: 10px;
      }
      .message-box input {
        flex: 1;
        border: none;
        padding: 5px 10px;
        outline: none;
        font-size: 18px;
        background-color: #303030;
        color: white;
      }
      input::placeholder {
        text-transform: capitalize;
      }

      .send-btn {
        rotate: 24deg;
        border-radius: 50%;
        background-color: green;
        padding: 5px;
        color: white;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo"><h1>WhatsApp</h1></div>
      <div class="search-bar">
        <input type="text" placeholder="Search Number" id="number" />
        <div class="search-icon" id="btn">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
      </div>
      <nav>
        <p>Home</p>
        <p>About us</p>
        <p>Products</p>
      </nav>
    </header>

    <!-- main portion of code -->

        <div class="user-info">

        <div class="user-info">

      </aside>

      <!-- this is your right -->

      <div class="right">
        <p>you can write here</p>
        <div class="message-box">
          <input type="text" placeholder="type your message" id="message" />
          <div class="send-btn">

        </div>
      </div>
    </main>

    <script></script>
  </body>
</html>
